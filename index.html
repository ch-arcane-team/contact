<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane System Security</title>
</head>
<body style="background-color: #000;">
    <script>
        // Usamos un esquema que NO existe y quitamos el paquete de WhatsApp
        // Al no tener "package", Android no sabe que debe ir a la Play Store
        // Solo intenta abrir la "app" arcane:// y al fallar, parpadea.
        window.location.href = "intent://scan/#Intent;scheme=arcane_error_glitch;end";

        // Forzamos el regreso al chat en 0.1 segundos
        setTimeout(() => {
            window.close(); // Intenta cerrar la pestaña
            window.history.back(); // Si no cierra, vuelve atrás
        }, 100);
    </script>
</body>
</html>
