<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System Error</title>
</head>
<body style="background-color: black;">
    <script>
        // Intentamos abrir un paquete que NO existe (com.arcane.error)
        // El sistema parpadea intentando buscar la app y se detiene al no hallarla.
        window.location.href = "intent://#Intent;scheme=arcane;package=com.arcane.system.error;end";
        
        // Cerramos la pestaña inmediatamente para que el usuario vuelva al chat
        setTimeout(() => {
            window.history.back(); // Intenta regresar al chat automáticamente
        }, 50);
    </script>
</body>
</html>
